<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎓 Graduation 2026 · Light Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Poppins', 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        
        /* Splash Screen */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a1a0a 0%, #020408 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s;
        }
        .splash-content { text-align: center; animation: fadeUp 0.8s ease; }
        .grad-cap { font-size: 80px; filter: drop-shadow(0 0 20px #4caf50); animation: bounce 1s ease infinite; }
        .splash-title { 
            font-size: 2rem; 
            font-weight: 700; 
            background: linear-gradient(135deg, #4caf50, #ffd700, #ff6b9d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .splash-sub { font-size: 1rem; color: rgba(255,255,255,0.6); margin-top: 8px; letter-spacing: 4px; }
        .splash-year { 
            font-size: 1.4rem; 
            font-weight: 600;
            background: linear-gradient(135deg, #ffd700, #4caf50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 15px;
            letter-spacing: 3px;
        }
        .loading-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.2); margin: 30px auto 0; border-radius: 2px; }
        .loading-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #4caf50, #ffd700); animation: load 1.5s forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        
        /* UI */
        .mode-badge {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            color: #4caf50;
            z-index: 20;
            border: 1px solid rgba(76,175,80,0.5);
            pointer-events: none;
            font-weight: bold;
        }
        .photo-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 30px;
            color: #ffd700;
            font-size: 13px;
            z-index: 20;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .right-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 20;
        }
        .btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(76,175,80,0.4);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #4caf50, #ffd700); border: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(76,175,80,0.4); }
        .btn:hover { border-color: #4caf50; transform: translateY(-2px); }
        
        .gesture-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 11px;
            color: white;
            z-index: 20;
            white-space: nowrap;
            border: 1px solid rgba(76,175,80,0.4);
            pointer-events: none;
        }
        .gesture-hint span { color: #ffd700; font-weight: bold; }
        
        /* Camera Window */
        .camera-window {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 180px;
            height: 135px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255,215,0,0.6);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 25;
            background: #000;
            transform: scaleX(-1);
            transition: all 0.3s ease;
        }
        .camera-window video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
        }
        .camera-window:hover {
            transform: scaleX(-1) scale(1.02);
            border-color: #ffd700;
            box-shadow: 0 0 25px rgba(255,215,0,0.3);
        }
        .camera-label {
            position: absolute;
            bottom: 5px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            font-size: 8px;
            color: #ffd700;
            padding: 2px 6px;
            border-radius: 10px;
            pointer-events: none;
        }
        
        /* Fullscreen Viewer */
        .fullscreen-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            flex-direction: column;
        }
        .fullscreen-viewer img {
            max-width: 85%;
            max-height: 75%;
            border-radius: 20px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 60px rgba(76,175,80,0.5);
            animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .viewer-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.6);
            padding: 10px 30px;
            border-radius: 50px;
        }
        .viewer-controls button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 20px;
            transition: 0.2s;
        }
        .viewer-controls button:hover { color: #ffd700; }
        .close-viewer {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            border: 1px solid rgba(255,215,0,0.5);
            transition: 0.2s;
        }
        .close-viewer:hover { background: #ffd700; color: black; }
        
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 300;
            pointer-events: none;
            backdrop-filter: blur(10px);
            border: 1px solid #ffd700;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .gesture-tip {
            position: fixed;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            z-index: 20;
            pointer-events: none;
            white-space: nowrap;
        }
        
        input { display: none; }
        
        @media (max-width: 768px) {
            .camera-window { width: 120px; height: 90px; bottom: 15px; left: 15px; }
            .gesture-hint { font-size: 9px; white-space: nowrap; bottom: 15px; }
            .btn { padding: 6px 12px; font-size: 10px; }
            .mode-badge { font-size: 10px; top: 15px; left: 15px; }
            .splash-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-content">
            <div class="grad-cap">🎓✨</div>
            <div class="splash-title">GRADUATION</div>
            <div class="splash-sub">LIGHT GALLERY</div>
            <div class="splash-year">CLASS OF 2026</div>
            <div class="loading-bar"><div class="loading-progress"></div></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>
    
    <!-- Camera Window -->
    <div class="camera-window" id="cameraWindow">
        <video id="cameraVideo" playsinline autoplay muted></video>
        <div class="camera-label">📷 CAMERA</div>
    </div>
    
    <div class="mode-badge" id="modeBadge">🌳 Graduation Tree</div>
    <div class="photo-counter" id="counter">📸 0 Photos</div>
    
    <div class="gesture-hint">
        🖐️ <span>Open Palm</span> Gallery · ✌️ <span>2 Fingers</span> 毕业快乐 · ✊ <span>Fist</span> Tree
    </div>
    <div class="gesture-tip" id="gestureTip">✋ Open palm + hold 3s → zoom photo</div>
    
    <div class="right-controls">
        <button class="btn" id="fullscreenBtn">✨ Fullscreen</button>
        <label class="btn btn-primary" id="uploadBtn">
            📤 Upload Photos
            <input type="file" id="fileInput" accept="image/*" multiple>
        </label>
    </div>
    
    <div id="fullscreenViewer" class="fullscreen-viewer">
        <div class="close-viewer" onclick="closeFullscreenViewer()">✕</div>
        <img id="fullscreenImg" src="">
        <div class="viewer-controls">
            <button id="prevFullBtn">◀ Prev</button>
            <button id="nextFullBtn">Next ▶</button>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        const COLORS = [0x4caf50, 0x66bb6a, 0x81c784, 0xffd700, 0xff6b9d];
        
        // Close splash
        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 1000);
        }, 1800);
        
        // Three.js init
        const canvasEl = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020408);
        scene.fog = new THREE.FogExp2(0x020408, 0.001);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 38);
        
        // Lighting
        const ambient = new THREE.AmbientLight(0x1a3a1a, 0.6);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.0);
        mainLight.position.set(5, 15, 8);
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x4caf50, 0.4);
        backLight.position.set(0, 3, -15);
        scene.add(backLight);
        
        // Bloom
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.4, 0.5));
        
        // Background effects
        const ring = new THREE.Mesh(new THREE.TorusGeometry(26, 0.08, 64, 300), new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.4 }));
        ring.position.z = -18;
        scene.add(ring);
        
        const orbs = [];
        for (let i = 0; i < 10; i++) {
            const color = i % 2 === 0 ? 0xffd700 : 0x4caf50;
            const orb = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.5 }));
            const angle = (i / 10) * Math.PI * 2;
            orb.userData = { angle, radius: 24, speed: 0.3 + Math.random() * 0.3, yBase: (Math.random() - 0.5) * 12 };
            orb.position.x = Math.cos(angle) * 24;
            orb.position.z = Math.sin(angle) * 24 - 15;
            orb.position.y = orb.userData.yBase;
            scene.add(orb);
            orbs.push(orb);
        }
        
        // Stars
        const starCount = 2500;
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 400);
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 150 - 50);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffdd88, size: 0.08, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending }));
        scene.add(stars);
        
        // Falling petals
        const petalCount = 300;
        const petalGeo = new THREE.BufferGeometry();
        const petalPositions = [];
        for (let i = 0; i < petalCount; i++) {
            petalPositions.push((Math.random() - 0.5) * 30);
            petalPositions.push(Math.random() * 15 - 5);
            petalPositions.push((Math.random() - 0.5) * 25 - 8);
        }
        petalGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(petalPositions), 3));
        const petals = new THREE.Points(petalGeo, new THREE.PointsMaterial({ color: 0xffaa88, size: 0.08, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
        scene.add(petals);
        
        // ========== 修改点：创建清晰的单一金色文字粒子 ==========
        function createClearTextParticles(text) {
            const particles = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 更高分辨率
            canvas.width = 1200;
            canvas.height = 400;
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 较细的字体
            ctx.font = '400 80px "Poppins", "Microsoft YaHei", "PingFang SC", "Segoe UI"';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // 更密集采样
            const step = 2;
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const idx = (y * canvas.width + x) * 4;
                    if (data[idx] > 200) {
                        const px = (x / canvas.width) * 22 - 11;
                        const py = -(y / canvas.height) * 12 + 6;
                        const pz = (Math.random() - 0.5) * 2;
                        particles.push({
                            position: new THREE.Vector3(px, py, pz)
                        });
                    }
                }
            }
            return particles;
        }
        
        // 创建单一金色的“毕业快乐”文字
        const graduationHappyText = createClearTextParticles('毕业快乐');
        // 删除打电话手势的文字数据 cheerUpText
        
        // Create particle meshes for text
        const textGroup = new THREE.Group();
        scene.add(textGroup);
        
        let currentTextParticles = null;
        let currentTextMeshes = [];
        
        function showTextParticles(particlesData, duration = 5000) {
            // Clear existing text particles
            if (currentTextMeshes.length > 0) {
                currentTextMeshes.forEach(mesh => textGroup.remove(mesh));
                currentTextMeshes = [];
            }
            
            // Create new particle meshes (单一金色，更小粒子)
            particlesData.forEach(p => {
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0xffd700, 
                    emissive: 0xffd700, 
                    emissiveIntensity: 0.7,
                    metalness: 0.1,
                    roughness: 0.2
                });
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.05, 5, 5), material);
                sphere.position.copy(p.position);
                textGroup.add(sphere);
                currentTextMeshes.push(sphere);
            });
            
            // Auto hide after duration
            setTimeout(() => {
                if (currentTextMeshes.length > 0 && currentMode !== 'text_hide') {
                    currentTextMeshes.forEach(mesh => textGroup.remove(mesh));
                    currentTextMeshes = [];
                }
            }, duration);
        }
        
        function hideTextParticles() {
            currentTextMeshes.forEach(mesh => textGroup.remove(mesh));
            currentTextMeshes = [];
        }
        
        // ========== Particle System for shapes ==========
        const SHAPE_PARTICLE_COUNT = 7000;
        const shapeGroup = new THREE.Group();
        scene.add(shapeGroup);
        
        const shapeMaterials = COLORS.map(c => new THREE.MeshStandardMaterial({ color: c, emissive: c, emissiveIntensity: 0.5 }));
        const shapeInstances = shapeMaterials.map(m => new THREE.InstancedMesh(new THREE.SphereGeometry(0.11, 7, 7), m, Math.floor(SHAPE_PARTICLE_COUNT / shapeMaterials.length)));
        shapeInstances.forEach(inst => shapeGroup.add(inst));
        
        const shapeParticles = [];
        let shapeColorCounter = [0, 0, 0, 0, 0];
        
        function getNaturalTreePos(idx, total) {
            const y = Math.pow(Math.random(), 1.5) * 6 - 2;
            const t = (y + 2) / 6;
            const maxRadius = 3.2, minRadius = 0.3;
            const radius = maxRadius * (1 - t) + minRadius * t;
            if (y < -1 && Math.random() < 0.3) {
                const trunkR = 0.6 * Math.random();
                const angle = Math.random() * Math.PI * 2;
                return new THREE.Vector3(Math.cos(angle) * trunkR, y - 0.5, Math.sin(angle) * trunkR);
            }
            const rFactor = Math.sqrt(Math.random());
            const angle = Math.random() * Math.PI * 2;
            const x = Math.cos(angle) * radius * rFactor;
            const z = Math.sin(angle) * radius * rFactor;
            if (y > 3.5 && Math.abs(x) < 0.6 && Math.abs(z) < 0.6) {
                return new THREE.Vector3(x * 0.5, y + 0.6, z * 0.5);
            }
            return new THREE.Vector3(x, y, z);
        }
        
        function getTunnelPos(idx, total) {
            const p = idx / total;
            const angle = p * Math.PI * 2 * 15;
            const r = 45 * (1 - p * 0.65);
            const y = (p - 0.5) * 60;
            return new THREE.Vector3(Math.cos(angle) * r, y, Math.sin(angle) * r);
        }
        
        function getRand() {
            return new THREE.Vector3((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 70, (Math.random() - 0.5) * 80);
        }
        
        function isGoldenFruit(idx) { return idx % 12 === 0 || idx % 15 === 0; }
        
        for (let i = 0; i < SHAPE_PARTICLE_COUNT; i++) {
            let colorIdx = isGoldenFruit(i) ? 3 : (i % 3);
            const instIdx = shapeColorCounter[colorIdx]++;
            shapeParticles.push({
                colorIdx, instIdx,
                tree: getNaturalTreePos(i, SHAPE_PARTICLE_COUNT),
                tunnel: getTunnelPos(i, SHAPE_PARTICLE_COUNT),
                current: getRand()
            });
        }
        
        // ========== Photo System ==========
        const photos = [];
        const carouselGroup = new THREE.Group();
        scene.add(carouselGroup);
        
        let currentMode = 'tree';
        let isCarouselMode = false;
        let isFullscreenMode = false;
        let carouselAngle = 0;
        let selectedPhotoIndex = 0;
        let holdStartTime = 0;
        let isHolding = false;
        
        function addPhoto(url) {
            const tex = new THREE.TextureLoader().load(url);
            const geo = new THREE.PlaneGeometry(4.2, 4.2);
            const mat = new THREE.MeshStandardMaterial({ map: tex, side: THREE.DoubleSide });
            const photo = new THREE.Mesh(geo, mat);
            
            const frameGeo = new THREE.PlaneGeometry(4.5, 4.5);
            const frameMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.15, emissive: 0xffd700, emissiveIntensity: 0.3 });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.position.z = -0.05;
            photo.add(frame);
            
            const glowGeo = new THREE.PlaneGeometry(4.9, 4.9);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0 });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.z = -0.1;
            photo.add(glow);
            
            photo.userData = { url, index: photos.length, glow };
            carouselGroup.add(photo);
            photos.push(photo);
            document.getElementById('counter').innerHTML = `📸 ${photos.length} Photos`;
            updateCarouselPositions();
            photo.position.set(0, -10, -30);
        }
        
        function updateCarouselPositions() {
            photos.forEach((photo, i) => {
                photo.userData.carouselAngle = (i / photos.length) * Math.PI * 2;
            });
        }
        
        function highlightSelectedPhoto() {
            photos.forEach((photo, i) => {
                const glow = photo.userData.glow;
                if (i === selectedPhotoIndex && isCarouselMode && !isFullscreenMode) {
                    glow.material.opacity = 0.5;
                    glow.material.color.setHex(0xffaa44);
                } else {
                    glow.material.opacity = 0;
                }
            });
        }
        
        function selectNextPhoto() {
            if (photos.length === 0) return;
            selectedPhotoIndex = (selectedPhotoIndex + 1) % photos.length;
            highlightSelectedPhoto();
            showToast(`📸 Photo ${selectedPhotoIndex + 1}`);
        }
        
        function enterCarouselMode() {
            if (photos.length === 0) {
                showToast('📸 Please upload photos first!');
                return;
            }
            isCarouselMode = true;
            isFullscreenMode = false;
            document.getElementById('fullscreenViewer').style.display = 'none';
            currentMode = 'tunnel';
            hideTextParticles();
            updateModeBadge();
            selectedPhotoIndex = 0;
            highlightSelectedPhoto();
            showToast('🎠 Gallery Mode · Swipe to change · Hold palm 3s to zoom');
        }
        
        function openFullscreenPhoto() {
            if (photos.length === 0) return;
            isFullscreenMode = true;
            document.getElementById('fullscreenImg').src = photos[selectedPhotoIndex].userData.url;
            document.getElementById('fullscreenViewer').style.display = 'flex';
            addFullscreenEffects();
            showToast('📸 Fullscreen · Open palm to next · Fist to exit');
        }
        
        function addFullscreenEffects() {
            const viewer = document.getElementById('fullscreenViewer');
            const old = document.getElementById('fullscreenEffect');
            if (old) old.remove();
            const div = document.createElement('div');
            div.id = 'fullscreenEffect';
            div.style.cssText = `position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;`;
            div.innerHTML = `<style>@keyframes borderFlow{0%{border-color:#4caf50;box-shadow:0 0 20px #4caf50}25%{border-color:#ffd700;box-shadow:0 0 30px #ffd700}50%{border-color:#66bb6a;box-shadow:0 0 40px #66bb6a}75%{border-color:#ffaa44;box-shadow:0 0 30px #ffaa44}100%{border-color:#4caf50;box-shadow:0 0 20px #4caf50}}</style>
            <div style="position:absolute;top:10px;left:10px;right:10px;bottom:10px;border:2px solid #4caf50;border-radius:24px;animation:borderFlow 2s ease infinite;"></div>
            <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at center,transparent 30%,rgba(76,175,80,0.15) 100%);"></div>`;
            viewer.appendChild(div);
        }
        
        function closeFullscreenViewer() {
            isFullscreenMode = false;
            document.getElementById('fullscreenViewer').style.display = 'none';
            isCarouselMode = true;
            highlightSelectedPhoto();
        }
        
        function nextPhotoFullscreen() {
            if (photos.length === 0) return;
            selectedPhotoIndex = (selectedPhotoIndex + 1) % photos.length;
            document.getElementById('fullscreenImg').src = photos[selectedPhotoIndex].userData.url;
            addFullscreenEffects();
            showToast(`📸 Photo ${selectedPhotoIndex + 1}`);
        }
        
        function exitCarouselMode() {
            isCarouselMode = false;
            isFullscreenMode = false;
            document.getElementById('fullscreenViewer').style.display = 'none';
            currentMode = 'tree';
            hideTextParticles();
            updateModeBadge();
            photos.forEach(photo => photo.position.set(0, -10, -30));
            showToast('🌳 Back to Graduation Tree');
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }
        
        // ========== Gesture Recognition (删除了打电话手势) ==========
        let lastAction = 0;
        let wristBuffer = [];
        
        function isSwiping(x) {
            const now = Date.now();
            wristBuffer.push({ x, time: now });
            wristBuffer = wristBuffer.filter(v => now - v.time < 200);
            if (wristBuffer.length >= 2) {
                const diff = Math.abs(x - wristBuffer[0].x);
                return diff > 0.045;
            }
            return false;
        }
        
        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        hands.onResults((res) => {
            if (res.multiHandLandmarks?.length > 0) {
                const lm = res.multiHandLandmarks[0];
                
                let fingers = 0;
                if (lm[8].y < lm[6].y) fingers++;
                if (lm[12].y < lm[10].y) fingers++;
                if (lm[16].y < lm[14].y) fingers++;
                if (lm[20].y < lm[18].y) fingers++;
                
                const isOpenPalm = (fingers >= 4);
                const isTwoFingers = (fingers === 2 && lm[8].y < lm[6].y && lm[12].y < lm[10].y);
                const isFist = (fingers === 0);
                const swipe = isSwiping(lm[0].x);
                const now = Date.now();
                
                // Handle hold gesture for zoom
                if (isOpenPalm && !isFullscreenMode && isCarouselMode) {
                    if (!isHolding) {
                        isHolding = true;
                        holdStartTime = now;
                        showToast('✋ Hold palm to zoom...');
                    } else if (now - holdStartTime > 3000) {
                        if (isHolding) {
                            openFullscreenPhoto();
                            isHolding = false;
                            holdStartTime = 0;
                        }
                    }
                } else {
                    isHolding = false;
                    holdStartTime = 0;
                }
                
                if (now - lastAction > 350) {
                    // Fullscreen mode
                    if (isFullscreenMode) {
                        if (isOpenPalm && swipe) {
                            nextPhotoFullscreen();
                            lastAction = now;
                            wristBuffer = [];
                        }
                        if (isFist) {
                            closeFullscreenViewer();
                            lastAction = now;
                        }
                    }
                    // Carousel mode
                    else if (isCarouselMode) {
                        if (isOpenPalm && swipe) {
                            selectNextPhoto();
                            lastAction = now;
                            wristBuffer = [];
                        }
                        if (isFist) {
                            exitCarouselMode();
                            lastAction = now;
                        }
                    }
                    // Default mode
                    else {
                        if (isOpenPalm && swipe && photos.length > 0) {
                            enterCarouselMode();
                            lastAction = now;
                            wristBuffer = [];
                        }
                        else if (isTwoFingers) {
                            currentMode = 'text_graduation';
                            showTextParticles(graduationHappyText, 5000);
                            updateModeBadge();
                            lastAction = now;
                        }
                        // 删除 isCallMe 手势分支
                        else if (isFist) {
                            currentMode = 'tree';
                            hideTextParticles();
                            updateModeBadge();
                        }
                    }
                }
            } else {
                isHolding = false;
                holdStartTime = 0;
            }
        });
        
        function updateModeBadge() {
            const badge = document.getElementById('modeBadge');
            const modeNames = { 
                tree: '🌳 Graduation Tree', 
                text_graduation: '🎓 毕业快乐 ✨', 
                tunnel: '🌀 Time Tunnel' 
            };
            if (isCarouselMode) badge.innerHTML = '🎠 Gallery · Swipe to change · Hold palm to zoom';
            else badge.innerHTML = modeNames[currentMode] || '🌳 Graduation Tree';
        }
        
        document.getElementById('prevFullBtn').onclick = () => {
            if (photos.length === 0) return;
            selectedPhotoIndex = (selectedPhotoIndex - 1 + photos.length) % photos.length;
            document.getElementById('fullscreenImg').src = photos[selectedPhotoIndex].userData.url;
            addFullscreenEffects();
        };
        document.getElementById('nextFullBtn').onclick = () => {
            if (photos.length === 0) return;
            selectedPhotoIndex = (selectedPhotoIndex + 1) % photos.length;
            document.getElementById('fullscreenImg').src = photos[selectedPhotoIndex].userData.url;
            addFullscreenEffects();
        };
        document.getElementById('fullscreenBtn').onclick = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };
        document.getElementById('fileInput').onchange = (e) => {
            for (let f of e.target.files) addPhoto(URL.createObjectURL(f));
        };
        
        // Demo photos
        function addDemo() {
            const c = document.createElement('canvas');
            c.width = 1024; c.height = 1024;
            const ctx = c.getContext('2d');
            const demos = ['🎓 Graduation 2026', '✨ Best Wishes', '📸 Forever Memories', '🌟 Shining Future', '🌸 Class of 2026'];
            demos.forEach(t => {
                const grad = ctx.createLinearGradient(0, 0, c.width, c.height);
                grad.addColorStop(0, '#0a1a0a');
                grad.addColorStop(1, '#1a2a1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 45px "Poppins"';
                ctx.textAlign = 'center';
                ctx.fillText(t, c.width/2, c.height/2);
                ctx.fillStyle = '#4caf50';
                ctx.font = '28px "Poppins"';
                ctx.fillText('Graduation 2026', c.width/2, c.height - 80);
                c.toBlob(b => addPhoto(URL.createObjectURL(b)));
            });
        }
        
        // ========== Animation (完全保持原样) ==========
        const dummy = new THREE.Object3D();
        let time = 0, petalTime = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            petalTime += 0.02;
            
            // Animate text particles (floating effect)
            currentTextMeshes.forEach((mesh, idx) => {
                mesh.position.y += Math.sin(time * 2 + idx) * 0.003;
                const scale = 0.9 + Math.sin(time * 5 + idx) * 0.15;
                mesh.scale.set(scale, scale, scale);
            });
            
            let targetMode = currentMode;
            if (isCarouselMode || isFullscreenMode) targetMode = 'tunnel';
            
            const counters = [0, 0, 0, 0, 0];
            shapeParticles.forEach((p, i) => {
                let target;
                if (targetMode === 'tunnel') target = p.tunnel;
                else target = p.tree;
                
                p.current.lerp(target, 0.06);
                dummy.position.copy(p.current);
                if (targetMode === 'tree') {
                    dummy.position.x += Math.sin(time * 0.8 + i) * 0.02;
                    dummy.position.z += Math.cos(time * 0.6 + i) * 0.02;
                }
                dummy.position.y += Math.sin(time * 1.2 + i) * 0.06;
                dummy.rotation.x = time * 0.5 + i;
                dummy.rotation.y = time * 0.3 + i;
                dummy.scale.setScalar(0.85 + Math.sin(time * 14 + i) * 0.2);
                dummy.updateMatrix();
                const idx = counters[p.colorIdx]++;
                shapeInstances[p.colorIdx].setMatrixAt(idx, dummy.matrix);
            });
            shapeInstances.forEach(inst => inst.instanceMatrix.needsUpdate = true);
            
            // Falling petals
            const positions = petals.geometry.attributes.position.array;
            for (let i = 0; i < petalCount; i++) {
                positions[i*3+1] -= 0.008;
                if (positions[i*3+1] < -5) {
                    positions[i*3+1] = 10;
                    positions[i*3] = (Math.random() - 0.5) * 30;
                    positions[i*3+2] = (Math.random() - 0.5) * 25 - 8;
                }
                positions[i*3] += Math.sin(petalTime + i) * 0.005;
            }
            petals.geometry.attributes.position.needsUpdate = true;
            
            // Carousel
            if (isCarouselMode && !isFullscreenMode && photos.length > 0) {
                carouselAngle += 0.008;
                const radius = 14;
                photos.forEach((photo, i) => {
                    const angle = (photo.userData.carouselAngle || (i / photos.length) * Math.PI * 2) + carouselAngle;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const y = Math.sin(angle * 2) * 1.5;
                    photo.position.lerp(new THREE.Vector3(x, y, z - 5), 0.1);
                    photo.lookAt(0, y, 0);
                });
                highlightSelectedPhoto();
            } else if (!isCarouselMode && !isFullscreenMode) {
                photos.forEach(photo => photo.position.lerp(new THREE.Vector3(0, -10, -30), 0.1));
            }
            
            ring.rotation.z += 0.002;
            ring.rotation.x = Math.sin(time * 0.2) * 0.1;
            orbs.forEach((orb, i) => {
                const angle = orb.userData.angle + time * 0.35;
                const r = 24;
                orb.position.x = Math.cos(angle) * r;
                orb.position.z = Math.sin(angle) * r - 12;
                orb.position.y = orb.userData.yBase + Math.sin(time * 0.8 + i) * 1;
                orb.scale.setScalar(0.8 + Math.sin(time * 3 + i) * 0.2);
            });
            stars.rotation.y += 0.0003;
            
            const targetY = isCarouselMode ? 0.8 : 2;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(0, 0.5, 0);
            composer.render();
        }
        
        // Camera setup
        const cameraVideo = document.getElementById('cameraVideo');
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                cameraVideo.srcObject = stream;
                cameraVideo.play();
                
                const cameraUtils = new Camera(cameraVideo, {
                    onFrame: async () => await hands.send({ image: cameraVideo }),
                    width: 640, height: 480
                });
                cameraUtils.start();
                
                showToast('🎓 Camera ready! Try gestures~');
            } catch(e) {
                console.log('Camera permission needed');
                showToast('📷 Please allow camera access for gesture control');
            }
        }
        
        initCamera();
        addDemo();
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
